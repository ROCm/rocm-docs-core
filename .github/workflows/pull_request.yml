name: Code
on:
  pull_request:

jobs:
  lint:
    name: Python Linting
    strategy:
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.10"]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        python-version: "${{ matrix.python-version }}"
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          requirements.txt
    - name: Cache venv
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
      with:
        path: .venv
        key: venv-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml','requirements.txt') }}
    - run: echo "PRE_COMMIT_HOME=$Env:GITHUB_WORKSPACE/.cache/pre-commit" >> "$Env:GITHUB_ENV"
      if: ${{ startsWith(matrix.os, 'windows') }}
    - run: echo "PRE_COMMIT_HOME=$GITHUB_WORKSPACE/.cache/pre-commit" >> "$GITHUB_ENV"
      if: ${{ !startsWith(matrix.os, 'windows') }}
    - name: Cache pre-commit
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
      with:
        path: ${{ env.PRE_COMMIT_HOME }}
        key: pre-commit-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('.pre-commit-config.yaml') }}
    - name: Install just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0
      with:
        just-version: '1.48.0'
    - name: Create virtual env, install requirements
      run: just deps
    - name: Check commit messages
      run: just _check-commit-range "refs/remotes/origin/${{ github.base_ref }}..HEAD"
    - name: Check linting, formatting, types
      run: just --set verbose_errors true -- check-codestyle

  test:
    name: Python Tests
    strategy:
      fail-fast: true
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.10"]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "${{ matrix.python-version }}"
        cache: pip
        cache-dependency-path: |
          pyproject.toml
          requirements.txt
    - name: Set up Doxygen
      uses: ssciwr/doxygen-install@329d88f5a303066a5bd006db7516b1925b86350e # v2.0.1
      with:
        version: 1.9.8
    - name: Set up Graphviz
      uses: ts-graphviz/setup-graphviz@b1de5da23ed0a6d14e0aeee8ed52fdd87af2363c # v2.0.2
      with:
        ubuntu-graphviz-version: 2.42.2-9ubuntu0.1
        windows-graphviz-version: '9.0.0'
    - name: Cache venv
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
      with:
        path: .venv
        key: venv-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml','requirements.txt') }}
    - name: Install just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b # v3.1.0
      with:
        just-version: '1.48.0'
    - name: Create virtual env, install requirements
      run: just deps
    - name: Install
      run: just install
    - name: Run tests
      run: just test
